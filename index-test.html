<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>WSA Webform Test</title>
    <link rel="stylesheet" href="/wsa-webform-widget.css" />
</head>
<body style="font-family: Arial; padding: 40px;">

  <h1>Webform Widget Test</h1>

  <div id="wsa-form"></div>

  <!-- Load built widget -->
  <script src="/widget.js"></script>

<script>
  /*
    White-label webform embed test.

    IMPORTANT:
    Do not place apiUrl or apiKey here anymore.

    The widget should only receive public white-label settings:
    - target
    - clientKey
    - formKey
    - source
  */
  window.WebSmartAssistantForm({
    target: "#wsa-form",
    clientKey: "evergreen-heights",
    formKey: "senior-living-contact",
    source: "webform"
  });
</script>

</body>
</html>
